<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

.categoria{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
}

h2{
    color:#00ff88;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.fps-btn{
    padding:15px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.fps-btn.ativo{
    background:#00ff88;
    color:black;
}
</style>
</head>

<body>

<div class="categoria">

<h2>⚡ FPS</h2>

<div class="grid">

<button class="fps-btn" onclick="selecionarFPS(this)">
30 FPS
</button>

<button class="fps-btn" onclick="selecionarFPS(this)">
60 FPS
</button>

<button class="fps-btn" onclick="selecionarFPS(this)">
120 FPS
</button>

</div>

</div>

<script>

function selecionarFPS(botao){

document.querySelectorAll('.fps-btn').forEach(btn=>{
btn.classList.remove('ativo');
});

botao.classList.add('ativo');

}

</script>

</body>
</html>

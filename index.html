<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otimização</title>

<style>
body{
    background:#0a0a0a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
    color:#00ff66;
    margin-bottom:25px;
}

.card{
    background:#151515;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,255,102,.2);
}

.titulo{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.descricao{
    color:#aaa;
    margin-bottom:15px;
}

.switch{
    position:relative;
    display:inline-block;
    width:60px;
    height:34px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#444;
    transition:.4s;
    border-radius:34px;
}

.slider:before{
    position:absolute;
    content:"";
    height:26px;
    width:26px;
    left:4px;
    bottom:4px;
    background:white;
    transition:.4s;
    border-radius:50%;
}

input:checked + .slider{
    background:#00ff66;
}

input:checked + .slider:before{
    transform:translateX(26px);
}

.botao{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#00ff66;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>⚡ OTIMIZAÇÃO</h1>

<div class="card">
<div class="titulo">Calibrar Sensi</div>
<div class="descricao">Melhora a precisão da sensibilidade.</div>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="card">
<div class="titulo">Mira Estável</div>
<div class="descricao">Reduz tremores da mira.</div>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="card">
<div class="titulo">120 FPS</div>
<div class="descricao">Ativar modo de alta fluidez.</div>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="card">
<div class="titulo">RAM Boost</div>
<div class="descricao">Libera memória para melhor desempenho.</div>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<button class="botao" onclick="alert('Configurações aplicadas!')">
🚀 EXECUTAR BOOST
</button>

</div>

</body>
</html>

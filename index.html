<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

#login{
background:#111;
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00ff88;
font-weight:bold;
}

#painel{
display:none;
text-align:center;
}

h1{
color:#00ff88;
}
</style>
</head>

<body>

<div id="login">
<h1>LOGIN</h1>

<input id="usuario" placeholder="Usuário">

<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">ENTRAR</button>
</div>

<div id="painel">
<h1>ACESSO LIBERADO</h1>
<p>Login funcionando.</p>
</div>

<script>
function entrar(){

let usuario=document.getElementById("usuario").value;
let senha=document.getElementById("senha").value;

if(usuario==="1" && senha==="1"){
document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";
}else{
alert("Usuário ou senha incorretos");
}

}
</script>

</body>
</html>
